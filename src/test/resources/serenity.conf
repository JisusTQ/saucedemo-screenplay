# =====================================================================
#  Configuracion de Serenity BDD
#  Proyecto: Automatizacion Swag Labs - Calidad de Software (UdeA)
# =====================================================================

# --- Navegador ---
# Serenity 5 descarga el driver automaticamente (Selenium Manager),
# asi que NO hace falta configurar chromedriver manualmente.
webdriver {
  driver = chrome
}

# Si algun integrante quiere correr sin ver el navegador, cambiar a true.
headless.mode = false

# Opciones del navegador Chrome.
chrome {
  switches = "--incognito;--start-maximized;--disable-infobars;--disable-popup-blocking;--disable-notifications"
}

# --- Reportes ---
serenity {
  project.name = "Automatizacion Swag Labs - Calidad de Software UdeA"
  # Captura una imagen por cada accion: enriquece el reporte para la sustentacion.
  take.screenshots = FOR_EACH_ACTION
}

# =====================================================================
#  PAUSA ENTRE PASOS PARA LA SUSTENTACION (requisito del taller)
# ---------------------------------------------------------------------
#  La pausa entre paso y paso la aplica el hook global DemoDelayHooks
#  (paquete stepdefinitions), leyendo la propiedad del sistema
#  "demo.step.delay" en milisegundos. Se activa por linea de comandos:
#
#    - Para la sustentacion:  mvn clean verify -Ddemo.step.delay=1500
#    - Para correr rapido/CI: mvn clean verify        (sin pausa)
# =====================================================================
