#  CONFIGURACION DE SERENITY
webdriver {
  driver = chrome
}

headless.mode = false

chrome {
  switches = "--incognito;--start-maximized;--disable-infobars;--disable-popup-blocking;--disable-notifications"
}

# --- Reportes ---
serenity {
  project.name = "Automatizacion Swag Labs - Calidad de Software UdeA"
  take.screenshots = FOR_EACH_ACTION
}
